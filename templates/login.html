<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0aff9d">
<title>Smart OSINT — Create Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
<script defer src="{{ url_for('static', filename='cyber.js') }}"></script>
</head>
<body class="d-flex align-items-center cyber-grid" style="min-height:100vh" data-fx="off">
<canvas id="radar-canvas" aria-hidden="true"></canvas>
<canvas id="lightning-canvas" aria-hidden="true"></canvas>
<canvas id="fx-canvas" aria-hidden="true"></canvas>
<div class="scanlines" aria-hidden="true"></div>
<div class="position-fixed top-0 end-0 p-3">
  <button id="toggleFx" class="btn btn-outline-primary btn-sm" type="button" aria-pressed="false" title="Toggle effects">FX</button>
</div>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
<div class="card neon-card shadow-sm p-4 reveal" data-tilt>
<h3 class="mb-3 text-center glitch scramble" data-text="🛡️ Smart OSINT Lookup">🛡️ Smart OSINT Lookup</h3>
        <p class="text-muted text-center">Sign in or create an account. You get {{ free_limit }} free searches.</p>
        <form method="POST" action="{{ url_for('login') }}">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input name="username" class="form-control" placeholder="Your username (letters/numbers only)" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter password (min 6 chars)" required>
          </div>
          <div class="d-grid gap-2">
            <button class="btn btn-primary">Continue</button>
          </div>
        </form>
        {% if message %}
          <div class="mt-3 text-danger">{{ message }}</div>
        {% endif %}
        <div class="mt-3 text-center">
          <a href="/admin" class="text-decoration-none small">Admin</a>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
