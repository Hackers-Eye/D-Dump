<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Upgrade — Smart OSINT</title>
<meta name="theme-color" content="#0aff9d">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
<script defer src="{{ url_for('static', filename='cyber.js') }}"></script>
</head>
<body class="bg-light cyber-grid" data-fx="off">
<canvas id="radar-canvas" aria-hidden="true"></canvas>
<canvas id="lightning-canvas" aria-hidden="true"></canvas>
<canvas id="fx-canvas" aria-hidden="true"></canvas>
<div class="scanlines" aria-hidden="true"></div>
<nav class="navbar navbar-expand shadow-sm">
  <div class="container">
<span class="navbar-brand"><span class="glitch scramble" data-text="Smart OSINT">Smart OSINT</span></span>
    <div class="d-flex align-items-center gap-2 ms-auto">
      <a href="/home" class="btn btn-light btn-sm">Back</a>
      <button id="toggleFx" class="btn btn-outline-primary btn-sm" type="button" aria-pressed="false">FX</button>
    </div>
  </div>
</nav>
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card p-4 shadow-sm text-center">
        <h4>Upgrade plans</h4>
        <p>Choose a plan. Admin will apply it after payment (you can ask admin to add).</p>
        <div class="row mt-4">
          <div class="col-md-6">
            <div class="card p-3 mb-2">
              <h5>Basic</h5>
              <p>+10 searches</p>
              <form method="POST" action="/request_upgrade">
                <input type="hidden" name="plan" value="10">
                <button class="btn btn-success w-100">Request Basic</button>
              </form>
            </div>
          </div>
          <div class="col-md-6">
            <div class="card p-3 mb-2">
              <h5>Pro</h5>
              <p>+20 searches</p>
              <form method="POST" action="/request_upgrade">
                <input type="hidden" name="plan" value="20">
                <button class="btn btn-primary w-100">Request Pro</button>
              </form>
            </div>
          </div>
        </div>
        <a href="/home" class="btn btn-link mt-3">Back</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
